<div class="container mt-5 text-center">
  <div class="card shadow-sm p-5">
    <h1 class="display-4">Renaissance Global</h1>
    <p class="text-muted">Simple Calculator Application</p>
    <button (click)="toggleModal()" class="btn btn-primary btn-lg mt-3">Launch Calculator</button>
  </div>
</div>

<div *ngIf="showModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center;">
  <div style="background: white; border-radius: 8px; width: 500px; max-width: 90%;">

    <!-- Header -->
    <div style="padding: 1rem; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center;">
      <h5 style="margin: 0; font-weight: bold;">Simple Calculator</h5>
      <button type="button" (click)="toggleModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
    </div>

    <!-- Body -->
    <div style="padding: 2rem;">
      <div style="margin-bottom: 1rem;">
        <label style="display: block; margin-bottom: 0.5rem; color: #666; font-size: 0.875rem; text-transform: uppercase;">Start Value</label>
        <input type="number" [(ngModel)]="start" style="width: 100%; padding: 0.75rem; font-size: 1.25rem; border: 1px solid #ddd; border-radius: 4px;">
      </div>

      <div style="margin-bottom: 1rem;">
        <label style="display: block; margin-bottom: 0.5rem; color: #666; font-size: 0.875rem; text-transform: uppercase;">Amount to Change</label>
        <input type="number" [(ngModel)]="amount" style="width: 100%; padding: 0.75rem; font-size: 1.25rem; border: 1px solid #ddd; border-radius: 4px;">
      </div>

      <div *ngIf="error" style="padding: 1rem; background: #fee; border: 1px solid #fcc; border-radius: 4px; color: #c00; margin-top: 1rem; font-size: 0.9rem;">
        <strong>Error:</strong> {{ error }}
      </div>
    </div>

    <!-- Footer -->
    <div style="padding: 1rem; background: #f8f9fa; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #ddd; border-radius: 0 0 8px 8px;">
      <div>
        <div style="font-size: 0.75rem; color: #666; margin-bottom: 0.25rem; text-transform: uppercase;">Result</div>
        <div style="font-size: 1.5rem; font-weight: bold; color: #0d6efd;">{{ result !== null ? result : '--' }}</div>
      </div>
      <div>
        <button type="button" (click)="calculate('add')" style="padding: 0.5rem 1.5rem; background: #198754; color: white; border: none; border-radius: 4px; margin-right: 0.5rem; cursor: pointer; font-size: 1rem;">Add</button>
        <button type="button" (click)="calculate('subtract')" style="padding: 0.5rem 1.5rem; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem;">Subtract</button>
      </div>
    </div>

  </div>
</div>
